<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkingZaka – Live Macro Strategy</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>

<header>
  <h1>ThinkingZaka</h1>
  <p>Live Macro Strategy Dashboard</p>
  <div id="status">System Status: LIVE</div>
</header>

<main>
  <section id="macro">
    <h2>Macro Regime</h2>
    <div id="macroStatus">Analyzing...</div>
  </section>

  <section id="market">
    <h2>Market Radar</h2>
    <div class="card" id="btc"></div>
    <div class="card" id="gold"></div>
    <div class="card" id="pltr"></div>
    <div class="card" id="qqq"></div>
    <div class="card" id="sol"></div>
  </section>

  <section id="alerts">
    <h2>Strategy Alerts</h2>
    <ul id="alertList"></ul>
  </section>
</main>

<script src="app.js"></script>
<script src="sw.js"></script>
</body>
</html>
